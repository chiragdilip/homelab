# Inventory: the machines Ansible manages, grouped by role.
# Groups let a playbook target "all control planes" or "all workers" at once.
all:
  children:
    control_plane:
      hosts:
        k3s-control:
          # --- Pi 5 (DietPi) — FILL THESE IN ---
          ansible_host: 192.168.2.19   # TODO: the Pi's IP on your LAN
          ansible_user: root         # TODO: DietPi SSH user (often 'dietpi' or 'root')
          ansible_ssh_private_key_file: ~/.ssh/k3s-pi

    workers:
      hosts:
        k3s-worker-1:
          ansible_host: 192.168.2.201
        k3s-worker-2:
          ansible_host: 192.168.2.202
        k3s-jetson:
          # --- Jetson Orin Nano (GPU node, arm64, wired-only) — CONFIRM THESE ---
          ansible_host: 192.168.2.32             # TODO: confirm the Jetson's current wired IP
          ansible_user: chirag
          ansible_ssh_private_key_file: ~/.ssh/id_homelab
          node_labels: "nvidia.com/gpu.present=true,node-role.kubernetes.io/gpu=true"
      vars:
        ansible_user: ubuntu           # default for the cloud-init VMs; per-host overrides win
