# Project-local Ansible config. Ansible auto-loads ansible.cfg from the directory
# you run it in, so run ansible commands from inside ansible/.
# NOTE: this is an .ini file — inline "# comments" after a value are NOT stripped
# and become part of the value. Keep comments on their own lines.
[defaults]
inventory          = inventory/hosts.yml
host_key_checking  = False
private_key_file   = ~/.ssh/id_homelab
remote_user        = ubuntu
interpreter_python = auto_silent
# Pretty YAML output is now a format option on the default callback
# (the old community.general.yaml plugin was removed in ansible-core 2.13+).
result_format      = yaml

[privilege_escalation]
# Run tasks via sudo (k3s install needs root).
become = True
