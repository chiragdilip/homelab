# Full local homelab agent configuration.
# Env overrides (useful in-cluster): OLLAMA_HOST, AGENT_MODEL, AGENT_WORKSPACE.

# --- Model / Ollama server ---
ollama_host: "http://127.0.0.1:11434"   # in-cluster: set OLLAMA_HOST to the ollama Service
model: "qwen2.5:7b"                       # 3b fits the Orin Nano; bump to 7b for harder tasks

# --- Agent behaviour ---
max_iterations: 10
temperature: 0.1

# --- Internet access ---
internet:
  enabled: true
  search_backend: "duckduckgo"   # via ddgs; no API key, privacy-friendly
  fetch_max_chars: 6000          # truncate fetched pages to keep context small

# --- Filesystem access (Jetson host via /workspace hostPath in-cluster) ---
filesystem:
  workspace: "/workspace"        # sandbox root for read/write
  allow_outside_workspace: false # true = read/write ANYWHERE (dangerous)

# --- Safety for mutating tools (write_file, run_shell) ---
safety:
  allow_mutations: true          # master switch; false = fully read-only
  require_approval: true         # mutations need approve=true (API) or y/N (CLI)
shell_allowlist:                 # permitted command prefixes; [] = allow ANY (dangerous)
  - "kubectl get"
  - "kubectl describe"
  - "kubectl top"
  - "systemctl status"
  - "df -h"
  - "free -h"
  - "ls"
  - "cat"
  - "ping -c"

system_prompt: |
  You are a capable local agent running on a Jetson Orin Nano inside a home k3s lab
  (control plane on a Raspberry Pi 5, two worker VMs on Proxmox). You can inspect the
  cluster, search and fetch from the internet, and read/write files and run shell
  commands on the Jetson within a sandboxed workspace.
  Always gather real state with tools before answering; never invent command output.
  If asked about current events, news, recent updates, a place, or anything you are
  not certain of, ALWAYS use web_search (and web_fetch to read a result) before
  answering. Prefer searching over asking the user to clarify or saying you don't
  know — only ask for clarification if a search genuinely cannot resolve it.
  For date/time, use current_datetime, not the web.
  For anything that changes the system (writing files, running shell commands), first
  state clearly what you will do and why; these actions require explicit approval.
  Stay within the workspace unless told otherwise. Be concise and cite tool output.
